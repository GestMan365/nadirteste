<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GestMan365</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #121212;
      --panel: #1f1f1f;
      --panel-2: #242424;
      --line: #505050;
      --line-soft: #333;
      --text: #d8d8d8;
      --muted: #9a9a9a;
      --green: #006915;
      --green-2: #00a428;
      --green-soft: #043f12;
      --cyan: #03a9f4;
      --orange: #ff7a00;
      --red: #e52626;
      --blue-gray: #8fb8c9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    button, input, select, textarea { font: inherit; }

    .topbar {
      height: 50px;
      background: #252525;
      border-bottom: 1px solid #050505;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 0 44px;
      box-shadow: 0 2px 5px rgba(0,0,0,.55);
    }

    .brand {
      display: grid;
      grid-template-columns: 34px auto;
      align-items: center;
      gap: 8px;
      line-height: 1;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #e7e7e7;
      color: #222;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 20px;
    }

    .brand-name {
      font-size: 27px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #f3f3f3;
    }

    .brand-sub {
      margin-left: 84px;
      margin-top: -8px;
      font-size: 11px;
      color: #fff;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ddd;
      font-size: 22px;
    }

    .top-icon {
      position: relative;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      color: #d7d7d7;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.6));
    }

    .badge {
      position: absolute;
      right: -7px;
      top: -9px;
      min-width: 15px;
      height: 15px;
      padding: 0 4px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: grid;
      place-items: center;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background:
        radial-gradient(circle at 70% 32%, #ff8b24 0 10%, transparent 11%),
        radial-gradient(circle at 35% 60%, #7a2f0f 0 20%, transparent 21%),
        linear-gradient(135deg, #21324c, #181818);
    }

    .toolbar {
      height: 68px;
      background: #171717;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px 10px 4px;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search {
      position: relative;
    }

    .search input,
    select {
      height: 32px;
      border: 1px solid #6a6a6a;
      background: #202020;
      color: #cfcfcf;
      border-radius: 3px;
      padding: 0 34px 0 6px;
      min-width: 162px;
      outline: none;
    }

    .search::after {
      content: "";
      position: absolute;
      right: 8px;
      top: 6px;
      width: 16px;
      height: 16px;
      border: 3px solid #8f8f8f;
      border-radius: 50%;
      box-shadow: 8px 8px 0 -6px #8f8f8f;
      transform: rotate(45deg);
    }

    .select-wrap {
      position: relative;
      display: grid;
      gap: 1px;
    }

    .select-wrap label {
      position: absolute;
      top: -6px;
      left: 8px;
      background: #171717;
      color: #8b8b8b;
      font-size: 10px;
      padding: 0 3px;
    }

    .tool-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .square-btn {
      width: 25px;
      height: 25px;
      border: 1px solid #555;
      border-radius: 3px;
      background: #252525;
      color: var(--green-2);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .square-btn.orange { color: var(--orange); }

    .workspace {
      height: calc(100vh - 118px);
      overflow: auto;
      padding: 10px 22px 18px 24px;
      background: #151515;
    }

    .unit {
      min-width: 1180px;
      border-left: 1px solid #595959;
    }

    .unit-head {
      height: 32px;
      border: 1px solid #4b4b4b;
      background: #222;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 9px 0 0;
      color: #ddd;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .drag-dots {
      width: 12px;
      align-self: stretch;
      background-image: radial-gradient(#777 1px, transparent 1.5px);
      background-size: 4px 5px;
      opacity: .85;
    }

    .collapse {
      width: 24px;
      height: 24px;
      border: 1px solid #777;
      border-radius: 3px;
      display: grid;
      place-items: center;
      color: #aaa;
      font-size: 19px;
    }

    .line-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 9px;
      padding-left: 0;
    }

    .line-card {
      border: 1px solid #555;
      border-radius: 4px;
      background: #1f1f1f;
      overflow: hidden;
      min-height: 142px;
      position: relative;
    }

    .line-card.compact { min-height: 142px; }

    .line-header {
      height: 34px;
      background: var(--green);
      border-bottom: 1px solid #094b15;
      color: #bfe7c6;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 34px;
      align-items: center;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 1px 1px rgba(0,0,0,.45);
    }

    .pin-icon {
      width: 24px;
      height: 24px;
      margin-left: 16px;
      border: 1px solid rgba(181, 231, 190, .65);
      border-radius: 3px;
      display: grid;
      place-items: center;
      color: #8bd099;
      font-size: 17px;
    }

    .map-icon {
      position: relative;
      width: 22px;
      height: 22px;
      border: 2px solid #fff;
      border-radius: 3px;
      background:
        linear-gradient(135deg, #41d55d 0 34%, #fff176 35% 55%, #ef5350 56% 100%);
      margin-left: 4px;
    }

    .alert-dot {
      position: absolute;
      right: -9px;
      top: -9px;
      min-width: 17px;
      height: 17px;
      border-radius: 999px;
      background: var(--cyan);
      color: #061016;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .line-body {
      margin: 0 6px 8px 12px;
      border: 1px solid #555;
      border-top: 0;
      border-radius: 0 0 4px 4px;
      min-height: 104px;
      position: relative;
      padding: 9px 12px 8px 24px;
    }

    .line-body::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 0;
      bottom: 0;
      width: 8px;
      background-image: radial-gradient(#777 1px, transparent 1.5px);
      background-size: 4px 5px;
    }

    .line-code {
      text-align: center;
      color: #aaa;
      font-weight: 700;
      font-size: 13px;
    }

    .line-type {
      text-align: center;
      color: #9e9e9e;
      font-size: 10px;
      font-weight: 700;
      margin: 6px 0 12px;
    }

    .machine-row {
      display: flex;
      align-items: end;
      gap: 20px;
      min-height: 46px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .machine {
      width: 58px;
      flex: 0 0 58px;
      position: relative;
      display: grid;
      justify-items: center;
      gap: 2px;
    }

    .machine::before {
      content: "";
      position: absolute;
      left: -7px;
      top: 3px;
      bottom: 13px;
      width: 6px;
      background-image: radial-gradient(#777 1px, transparent 1.5px);
      background-size: 4px 5px;
    }

    .machine-box {
      width: 58px;
      height: 42px;
      border: 1px solid #666;
      border-radius: 4px;
      background: #202020;
      display: grid;
      place-items: center;
      color: var(--green-2);
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.35);
    }

    .machine-name {
      color: #b5b5b5;
      font-size: 10px;
      line-height: 1;
      max-width: 62px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .machine-alert {
      position: absolute;
      right: -7px;
      top: -8px;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--cyan);
      color: #031016;
      font-size: 11px;
      font-weight: 800;
      display: grid;
      place-items: center;
      z-index: 2;
    }

    .ico {
      width: 34px;
      height: 28px;
      position: relative;
    }

    .ico-tank {
      border: 2px solid var(--green-2);
      border-radius: 5px 5px 10px 10px;
      width: 18px;
      height: 25px;
      margin: 2px auto 0;
    }

    .ico-tank::before {
      content: "";
      position: absolute;
      left: 14px;
      top: -2px;
      width: 7px;
      height: 7px;
      border: 2px solid var(--green-2);
      border-bottom: 0;
    }

    .ico-me {
      display: grid;
      grid-template-columns: repeat(3, 8px);
      gap: 2px;
      justify-content: center;
      padding-top: 4px;
    }

    .ico-me span {
      height: 25px;
      border: 2px solid var(--green-2);
      border-radius: 999px;
      position: relative;
    }

    .ico-box {
      width: 31px;
      height: 22px;
      margin: 4px auto;
      border: 2px solid var(--green-2);
      transform: skewY(-17deg);
    }

    .ico-funnel {
      width: 32px;
      height: 28px;
      margin: 0 auto;
      border: 2px solid var(--green-2);
      border-top: 0;
      clip-path: polygon(8% 0, 92% 0, 60% 60%, 60% 100%, 40% 100%, 40% 60%);
      background: rgba(0,164,40,.08);
    }

    .ico-os {
      width: 38px;
      height: 38px;
      border: 3px solid var(--green-2);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 800;
      color: var(--green-2);
    }

    .ico-light {
      width: 20px;
      height: 20px;
      margin: 4px auto;
      background: var(--green-soft);
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(0,164,40,.3);
    }

    .ico-light::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 23px;
      width: 2px;
      height: 8px;
      background: var(--green-2);
    }

    .ico-flow {
      width: 40px;
      height: 30px;
      margin: 0 auto;
      border-left: 6px solid var(--blue-gray);
      border-right: 6px solid var(--blue-gray);
      position: relative;
    }

    .ico-flow::before,
    .ico-flow::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 7px;
      background: var(--blue-gray);
      right: 0;
    }

    .ico-flow::before { top: 4px; }
    .ico-flow::after { bottom: 4px; }

    .details-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 360px;
      max-width: calc(100vw - 32px);
      background: #202020;
      border: 1px solid #5b5b5b;
      border-radius: 6px;
      box-shadow: 0 14px 36px rgba(0,0,0,.45);
      display: none;
      z-index: 20;
    }

    .details-panel.open { display: block; }

    .details-head {
      height: 38px;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-weight: 700;
      color: #d7f3dc;
    }

    .details-body {
      padding: 12px;
      display: grid;
      gap: 8px;
      color: #cfcfcf;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      background: #303030;
      border: 1px solid #555;
      color: #cfcfcf;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .pill.green { color: #83e896; border-color: #197c2c; }
    .pill.orange { color: #ffbb74; border-color: #8a4f12; }
    .pill.red { color: #ff8888; border-color: #9a2929; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tab {
      height: 30px;
      border: 1px solid #555;
      background: #202020;
      color: #bbb;
      border-radius: 3px;
      padding: 0 10px;
      cursor: pointer;
    }

    .tab.active {
      background: var(--green);
      color: #d7f3dc;
      border-color: var(--green);
    }

    .admin-panel {
      display: none;
      min-width: 1180px;
    }

    .admin-panel.active { display: block; }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(0, 1.3fr);
      gap: 10px;
    }

    .card {
      background: #202020;
      border: 1px solid #555;
      border-radius: 4px;
      overflow: hidden;
    }

    .card-head {
      height: 34px;
      background: var(--green);
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #cdebd2;
      font-weight: 700;
    }

    .form-grid {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: grid;
      gap: 4px;
      color: #aaa;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .field {
      height: 32px;
      border: 1px solid #626262;
      border-radius: 3px;
      background: #151515;
      color: #ddd;
      padding: 0 8px;
      width: 100%;
    }

    textarea.field {
      min-height: 70px;
      padding-top: 8px;
      resize: vertical;
    }

    .full { grid-column: 1 / -1; }

    .button {
      height: 32px;
      border: 1px solid #0d841f;
      border-radius: 3px;
      background: var(--green);
      color: #dff3e2;
      cursor: pointer;
      font-weight: 700;
      padding: 0 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #3a3a3a;
      text-align: left;
      color: #cfcfcf;
    }

    th {
      background: #181818;
      color: #9b9b9b;
      font-size: 11px;
      text-transform: uppercase;
    }

    .table-wrap { overflow: auto; }

    .fab {
      position: fixed;
      right: 8px;
      bottom: 18px;
      width: 44px;
      height: 54px;
      border-radius: 12px;
      background: #5b4df5;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,.4);
      border: 0;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .workspace { height: auto; }
      .line-grid { grid-template-columns: 1fr; }
      .unit, .admin-panel { min-width: 980px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand">
        <div class="brand-mark">G</div>
        <div class="brand-name">GestMan365</div>
      </div>
      <div class="brand-sub">industrial intelligence</div>
    </div>
    <div class="top-actions" aria-label="Atalhos">
      <div class="top-icon">⌂</div>
      <div class="top-icon">▰<span class="badge">1</span></div>
      <div class="top-icon">☁<span class="badge">31</span></div>
      <div class="top-icon">?</div>
      <div class="avatar"></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="filters">
      <div class="search"><input id="searchInput" placeholder="Pesquisar"></div>
      <div class="select-wrap">
        <label>Regiao</label>
        <select id="regionFilter">
          <option value="">[Todas]</option>
          <option>Linha 01 - Producao</option>
          <option>Linha 02 - Producao</option>
          <option>Utilidades</option>
        </select>
      </div>
    </div>
    <div class="tool-buttons">
      <span id="connectionStatus" class="pill">Conectando...</span>
      <button class="square-btn orange" id="filterBtn">▼</button>
      <button class="square-btn" id="reloadBtn">↻</button>
    </div>
  </div>

  <main class="workspace">
    <div class="tabs">
      <button class="tab active" data-view="overview">Parque industrial</button>
      <button class="tab" data-view="admin">Cadastros</button>
    </div>

    <section class="unit" id="overview">
      <div class="unit-head">
        <div class="drag-dots"></div>
        <div class="collapse">−</div>
        <div>UNIDADE 01- FABRICA - <span id="locationCount">0</span> local(is)</div>
      </div>
      <div class="line-grid" id="lineGrid"></div>
    </section>

    <section class="admin-panel" id="admin">
      <div class="admin-grid">
        <div class="card">
          <div class="card-head">Criar local / linha</div>
          <form class="form-grid" id="locationForm">
            <label>Nome <input class="field" name="nome" placeholder="Linha 12 - Producao" required></label>
            <label>Tipo
              <select class="field" name="tipo"><option>Linha</option><option>Area</option><option>Celula</option><option>Sala</option></select>
            </label>
            <label>Cor <input class="field" name="cor" value="#006915"></label>
            <label>Codigo visual <input class="field" name="codigo_visual" placeholder="L12"></label>
            <div class="full"><button class="button" type="submit">Salvar local</button></div>
          </form>
        </div>

        <div class="card">
          <div class="card-head">Criar maquina / equipamento</div>
          <form class="form-grid" id="assetForm">
            <label>Codigo <input class="field" name="codigo" placeholder="ME-40" required></label>
            <label>Nome <input class="field" name="nome" placeholder="Misturador" required></label>
            <label>Setor <input class="field" name="setor" placeholder="Linha de producao" required></label>
            <label>Local <select class="field" name="local_id" id="assetLocation"></select></label>
            <label>Tag <select class="field" name="tag_id" id="assetTag"></select></label>
            <label>Subtag <select class="field" name="sub_tag_id" id="assetSubTag"></select></label>
            <label>Criticidade
              <select class="field" name="criticidade"><option>Baixa</option><option selected>Media</option><option>Alta</option></select>
            </label>
            <label>Status
              <select class="field" name="status"><option selected>Operando</option><option>Em manutencao</option><option>Inspecao</option><option>Inativo</option></select>
            </label>
            <label>Responsavel <input class="field" name="responsavel"></label>
            <label>Tipo visual
              <select class="field" name="icone">
                <option value="me">ME - modulo</option>
                <option value="tank">RT - tanque</option>
                <option value="box">MF - caixa</option>
                <option value="funnel">INK - funil</option>
                <option value="os">OS - ordem</option>
                <option value="light">ILUP - luz</option>
                <option value="flow">Fluxo</option>
              </select>
            </label>
            <div class="full"><button class="button" type="submit">Salvar maquina</button></div>
          </form>
        </div>
      </div>

      <div class="admin-grid" style="margin-top:10px">
        <div class="card">
          <div class="card-head">Tags e subtags</div>
          <form class="form-grid" id="tagForm">
            <label>Tag <input class="field" name="codigo" placeholder="MEC" required></label>
            <label>Nome <input class="field" name="nome" placeholder="Mecanica" required></label>
            <label class="full">Descricao <textarea class="field" name="descricao"></textarea></label>
            <div class="full"><button class="button" type="submit">Salvar tag</button></div>
          </form>
          <form class="form-grid" id="subTagForm">
            <label>Tag principal <select class="field" name="tag_id" id="subTagParent"></select></label>
            <label>Subtag <input class="field" name="codigo" placeholder="ROL" required></label>
            <label class="full">Nome <input class="field" name="nome" placeholder="Rolamento" required></label>
            <div class="full"><button class="button" type="submit">Salvar subtag</button></div>
          </form>
        </div>
        <div class="card">
          <div class="card-head">Ativos cadastrados</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Codigo</th><th>Nome</th><th>Local</th><th>Tag</th><th>Subtag</th><th>Status</th></tr></thead>
              <tbody id="assetRows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <aside class="details-panel" id="detailsPanel">
    <div class="details-head">
      <span id="detailsTitle">Equipamento</span>
      <button class="square-btn" id="closeDetails">×</button>
    </div>
    <div class="details-body" id="detailsBody"></div>
  </aside>

  <button class="fab" id="adminFab">▦</button>

  <script>
    const SUPABASE_URL = "https://zkkyiqtzmimcoderjrrm.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_h88SLb98aMdmGCJvEO6yFw_QuJ4I3bI";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

    const fallback = {
      locations: Array.from({ length: 11 }, (_, index) => ({
        id: `loc-${index + 1}`,
        nome: `Linha ${String(index + 1).padStart(2, "0")} - Producao`,
        tipo: "Linha",
        cor: "#006915",
        codigo_visual: `L${String(index + 1).padStart(2, "0")}`
      })),
      tags: [
        { id: "tag-mec", codigo: "MEC", nome: "Mecanica", descricao: "Conjuntos mecanicos" },
        { id: "tag-ele", codigo: "ELE", nome: "Eletrica", descricao: "Comandos e motores" },
        { id: "tag-util", codigo: "UTIL", nome: "Utilidades", descricao: "Energia e ar comprimido" }
      ],
      subTags: [
        { id: "sub-rol", tag_id: "tag-mec", codigo: "ROL", nome: "Rolamentos" },
        { id: "sub-mot", tag_id: "tag-ele", codigo: "MOT", nome: "Motor eletrico" },
        { id: "sub-cmp", tag_id: "tag-util", codigo: "CMP", nome: "Compressor" }
      ],
      assets: []
    };

    const machineCodes = [
      ["RT-14","ME-01","MF-06","ME-31","RT-01","INK-22","ME-29","INK-20","OS-L01","APA-05","ILUP-01"],
      ["ILUP-02","INK-21","BL-01","EST-03","MF-01","APA-02","RT-02","ME-03","OS-L02"],
      ["ILUP-03","INK-30","OS-L03","ME-13","RT-12","MF-07","INK-16","ME-06"],
      ["APA-09","APA-06","MF-03","ME-11","INK-17","MF-04","INK-06","IMP-01","ME-32","OS-L04","ILUP-04"],
      ["RT-13","APA-01","ME-07","INK-29","OS-L05","CH-04","ME-09","RT-03","ILUP-05","INK-24","MF-05"],
      ["ILUP-06","RT-05","INK-26","RT-06","MF-09","ME-35","OS-L06","INK-23","MF-08"],
      ["OS-L07","APA-04","ILUP-07","MF-14","RT-11","ME-34","INK-27"],
      ["ILUP-08","OS-L08","ME-04","RT-10","MF-16","RF-01","INK-14","ME-15"],
      ["ILUP-09","APA-08","INK-19","INK-18","OS-L09","ME-16","RT-07","RT-08","SLE-01"],
      ["ME-22","ILUP-10","INK-12","MF-10","ME-27","MF-12","OS-L10"],
      ["APA-10","MF-19","OS-L11","ME-41","INK-31","RT-15","ILUP-11"]
    ];

    fallback.assets = machineCodes.flatMap((codes, lineIndex) => codes.map((code, machineIndex) => ({
      id: `asset-${lineIndex + 1}-${machineIndex + 1}`,
      codigo: code,
      nome: code,
      setor: "Linha de producao",
      local_id: `loc-${lineIndex + 1}`,
      tag_id: code.startsWith("ME") || code.startsWith("RT") ? "tag-mec" : code.startsWith("ILUP") ? "tag-ele" : "tag-util",
      sub_tag_id: code.startsWith("ME") ? "sub-rol" : code.startsWith("ILUP") ? "sub-mot" : "sub-cmp",
      criticidade: code.includes("OS") || code.includes("INK") ? "Alta" : machineIndex % 3 === 0 ? "Media" : "Baixa",
      status: machineIndex % 9 === 0 ? "Inspecao" : "Operando",
      responsavel: ["Manutencao", "Producao", "Confiabilidade"][machineIndex % 3],
      icone: iconFor(code),
      alertas: code.includes("INK") ? 1 : code.includes("ME-35") ? 2 : 0
    })));

    const state = {
      locations: [],
      tags: [],
      subTags: [],
      assets: [],
      supabaseReady: false
    };

    function iconFor(code) {
      if (code.startsWith("RT")) return "tank";
      if (code.startsWith("ME")) return "me";
      if (code.startsWith("MF") || code.startsWith("APA") || code.startsWith("EST") || code.startsWith("CH")) return "box";
      if (code.startsWith("INK")) return "funnel";
      if (code.startsWith("OS") || code.startsWith("BL") || code.startsWith("RF") || code.startsWith("SLE") || code.startsWith("TNL")) return "os";
      if (code.startsWith("ILUP")) return "flow";
      return "light";
    }

    function newId(prefix) {
      return `${prefix}-${crypto.randomUUID ? crypto.randomUUID() : Date.now()}`;
    }

    function byId(collection, id) {
      return collection.find(item => item.id === id);
    }

    function label(collection, id, field = "nome") {
      return byId(collection, id)?.[field] || "";
    }

    function pillClass(value) {
      if (["Alta", "Em manutencao", "Critica"].includes(value)) return "red";
      if (["Media", "Inspecao"].includes(value)) return "orange";
      return "green";
    }

    function iconHtml(type) {
      if (type === "tank") return `<div class="ico ico-tank"></div>`;
      if (type === "me") return `<div class="ico ico-me"><span></span><span></span><span></span></div>`;
      if (type === "box") return `<div class="ico ico-box"></div>`;
      if (type === "funnel") return `<div class="ico ico-funnel"></div>`;
      if (type === "os") return `<div class="ico-os">OS</div>`;
      if (type === "flow") return `<div class="ico ico-flow"></div>`;
      return `<div class="ico ico-light"></div>`;
    }

    function renderSelects() {
      const locationOptions = [`<option value="">Sem local</option>`].concat(state.locations.map(item => `<option value="${item.id}">${item.nome}</option>`)).join("");
      const tagOptions = [`<option value="">Sem tag</option>`].concat(state.tags.map(item => `<option value="${item.id}">${item.codigo} - ${item.nome}</option>`)).join("");
      const subTagOptions = [`<option value="">Sem subtag</option>`].concat(state.subTags.map(item => `<option value="${item.id}">${item.codigo} - ${item.nome}</option>`)).join("");
      document.getElementById("assetLocation").innerHTML = locationOptions;
      document.getElementById("assetTag").innerHTML = tagOptions;
      document.getElementById("assetSubTag").innerHTML = subTagOptions;
      document.getElementById("subTagParent").innerHTML = tagOptions;
    }

    function renderOverview() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      const region = document.getElementById("regionFilter").value;
      const locations = state.locations.filter(location => {
        const regionOk = !region || location.nome === region || location.tipo === region;
        const termOk = !term || location.nome.toLowerCase().includes(term) || state.assets.some(asset => asset.local_id === location.id && `${asset.codigo} ${asset.nome}`.toLowerCase().includes(term));
        return regionOk && termOk;
      });

      document.getElementById("locationCount").textContent = locations.length;
      document.getElementById("lineGrid").innerHTML = locations.map(location => {
        const assets = state.assets.filter(asset => asset.local_id === location.id);
        const alertCount = assets.reduce((sum, asset) => sum + Number(asset.alertas || (asset.criticidade === "Alta" ? 1 : 0)), 0);
        return `
          <article class="line-card">
            <div class="line-header">
              <div class="pin-icon">⌖</div>
              <div>${location.nome}</div>
              <div class="map-icon"><span class="alert-dot">${alertCount}</span></div>
            </div>
            <div class="line-body">
              <div class="line-code">${location.codigo_visual || location.nome.replace(/[^0-9]/g, "") || location.tipo}</div>
              <div class="line-type">LINHA DE PRODUCAO</div>
              <div class="machine-row">
                ${assets.map(asset => `
                  <button class="machine" data-asset-id="${asset.id}" title="${asset.codigo} - ${asset.nome}">
                    <span class="machine-box">
                      ${asset.alertas ? `<span class="machine-alert">${asset.alertas}</span>` : ""}
                      ${iconHtml(asset.icone || iconFor(asset.codigo))}
                    </span>
                    <span class="machine-name">${asset.codigo}</span>
                  </button>
                `).join("")}
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".machine").forEach(button => button.addEventListener("click", () => openDetails(button.dataset.assetId)));
    }

    function renderAdmin() {
      document.getElementById("assetRows").innerHTML = state.assets.slice(0, 120).map(asset => `
        <tr>
          <td>${asset.codigo}</td>
          <td>${asset.nome}</td>
          <td>${label(state.locations, asset.local_id) || "-"}</td>
          <td>${label(state.tags, asset.tag_id, "codigo") || "-"}</td>
          <td>${label(state.subTags, asset.sub_tag_id, "codigo") || "-"}</td>
          <td><span class="pill ${pillClass(asset.status)}">${asset.status}</span></td>
        </tr>
      `).join("");
    }

    function render() {
      renderSelects();
      renderOverview();
      renderAdmin();
    }

    function openDetails(assetId) {
      const asset = byId(state.assets, assetId);
      if (!asset) return;
      document.getElementById("detailsTitle").textContent = `${asset.codigo} - ${asset.nome}`;
      document.getElementById("detailsBody").innerHTML = `
        <div><span class="pill ${pillClass(asset.criticidade)}">${asset.criticidade}</span> <span class="pill ${pillClass(asset.status)}">${asset.status}</span></div>
        <div><strong>Local:</strong> ${label(state.locations, asset.local_id) || "-"}</div>
        <div><strong>Tag:</strong> ${label(state.tags, asset.tag_id, "codigo") || "-"} / ${label(state.subTags, asset.sub_tag_id, "codigo") || "-"}</div>
        <div><strong>Responsavel:</strong> ${asset.responsavel || "-"}</div>
        <div><strong>MTTR estimado:</strong> ${(asset.criticidade === "Alta" ? 7.4 : 4.2).toFixed(1)}h</div>
        <div><strong>MTBF estimado:</strong> ${asset.criticidade === "Alta" ? 116 : 184}h</div>
      `;
      document.getElementById("detailsPanel").classList.add("open");
    }

    async function loadTable(name, fallbackRows) {
      const { data, error } = await client.from(name).select("*").order("created_at", { ascending: false });
      if (error) throw error;
      return data?.length ? data : fallbackRows;
    }

    async function refresh() {
      document.getElementById("connectionStatus").textContent = "Conectando...";
      try {
        state.locations = await loadTable("locais", fallback.locations);
        state.tags = await loadTable("tags", fallback.tags);
        state.subTags = await loadTable("sub_tags", fallback.subTags);
        state.assets = await loadTable("ativos", fallback.assets);
        state.assets = state.assets.map(asset => ({ ...asset, icone: asset.icone || iconFor(asset.codigo), alertas: asset.alertas || (asset.criticidade === "Alta" ? 1 : 0) }));
        state.supabaseReady = true;
        document.getElementById("connectionStatus").textContent = "Supabase online";
        render();
      } catch (error) {
        state.locations = [...fallback.locations];
        state.tags = [...fallback.tags];
        state.subTags = [...fallback.subTags];
        state.assets = [...fallback.assets];
        state.supabaseReady = false;
        document.getElementById("connectionStatus").textContent = "Modo demonstracao";
        render();
      }
    }

    async function insertOrMemory(table, payload, collection, prefix) {
      Object.keys(payload).forEach(key => {
        if (payload[key] === "") payload[key] = null;
      });
      if (state.supabaseReady) {
        const { error } = await client.from(table).insert(payload);
        if (error) {
          alert(error.message);
          return;
        }
        await refresh();
        return;
      }
      collection.unshift({ id: newId(prefix), ...payload });
      render();
    }

    document.getElementById("reloadBtn").addEventListener("click", refresh);
    document.getElementById("searchInput").addEventListener("input", renderOverview);
    document.getElementById("regionFilter").addEventListener("change", renderOverview);
    document.getElementById("closeDetails").addEventListener("click", () => document.getElementById("detailsPanel").classList.remove("open"));
    document.getElementById("adminFab").addEventListener("click", () => switchView("admin"));

    document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => switchView(tab.dataset.view)));

    function switchView(view) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      document.getElementById("overview").style.display = view === "overview" ? "block" : "none";
      document.getElementById("admin").classList.toggle("active", view === "admin");
    }

    document.getElementById("locationForm").addEventListener("submit", async event => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
      await insertOrMemory("locais", payload, state.locations, "loc");
      event.currentTarget.reset();
    });

    document.getElementById("assetForm").addEventListener("submit", async event => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
      await insertOrMemory("ativos", { ...payload, alertas: payload.criticidade === "Alta" ? 1 : 0 }, state.assets, "asset");
      event.currentTarget.reset();
    });

    document.getElementById("tagForm").addEventListener("submit", async event => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
      await insertOrMemory("tags", payload, state.tags, "tag");
      event.currentTarget.reset();
    });

    document.getElementById("subTagForm").addEventListener("submit", async event => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
      await insertOrMemory("sub_tags", payload, state.subTags, "sub");
      event.currentTarget.reset();
    });

    switchView("overview");
    refresh();
  </script>
</body>
</html>
